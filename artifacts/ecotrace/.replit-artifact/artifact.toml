kind = "web"
previewPath = "/"
title = "EcoTrace"
version = "1.0.0"
id = "artifacts/ecotrace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23651

[services.development]
run = "pnpm --filter @workspace/ecotrace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecotrace", "run", "build" ]
publicDir = "artifacts/ecotrace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23651"
BASE_PATH = "/"
